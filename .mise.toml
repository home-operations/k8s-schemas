[settings]
experimental = true

[env]
WORKSPACE = "{{config_root}}"
BUILD_DIR = "{{config_root}}/build"
SITE_DIR = "{{config_root}}/site"

[tools]
"aqua:carvel-dev/vendir" = "0.45.3"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:jqlang/jq" = "1.8.1"
"aqua:fluxcd/flux2" = "2.8.7"
"aqua:sigstore/cosign" = "3.0.6"
"ubi:sholdee/crd-schema-publisher" = "2026.515.13351"

[tasks.build]
description = "Extract CRDs from one source (usage: mise run build <source-dir> <output-file>)"
run = "./scripts/build.sh"

[tasks.all]
description = "Build every source and render the site locally"
run = """
set -eu
rm -rf "$BUILD_DIR" "$SITE_DIR"
mkdir -p "$BUILD_DIR"
for dir in sources/*/; do
  name=$(basename "$dir")
  ./scripts/build.sh "$dir" "$BUILD_DIR/$name.yaml"
done
crd-schema-publisher convert -d "$BUILD_DIR" -o "$SITE_DIR" --render
"""

[tasks.clean]
description = "Remove build and site artifacts"
run = 'rm -rf "$BUILD_DIR" "$SITE_DIR"'
