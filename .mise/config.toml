[settings]
experimental = true

[env]
WORKSPACE = "{{config_root}}"
OUT_DIR = "{{config_root}}/out"

[tools]
cosign = "3.0.6"
flux2 = "2.8.8"
jq = "1.8.1"
kind = "0.32.0"
kubectl = "1.36.1"
lefthook = "2.1.9"
oxfmt = "0.53.0"
sd = "1.1.0"
"aqua:sholdee/crd-schema-publisher" = "2026.603.41610"
vendir = "0.45.4"
yq = "4.53.3"
zizmor = "1.25.2"

[tasks.build]
description = "Extract CRDs from one source (usage: mise run build <source-dir> <output-file>)"
run = "./scripts/build.sh"

[tasks.swagger]
description = "Dump the pinned cluster's OpenAPI spec for native-type schemas"
run = 'scripts/builtins-extract.sh native "$OUT_DIR/swagger.json"'

[tasks.all]
description = "Build every source and render the site locally"
run = """
set -eu
rm -rf "$OUT_DIR"
mkdir -p "$OUT_DIR/crds"
for dir in sources/*/*/; do
  name=$(basename "$(dirname "$dir")")_$(basename "$dir")
  ./scripts/build.sh "$dir" "$OUT_DIR/crds/$name.yaml"
done
scripts/builtins-extract.sh native "$OUT_DIR/swagger.json"
crd-schema-publisher convert -d "$OUT_DIR/crds" --openapi "$OUT_DIR/swagger.json" --kustomize -o "$OUT_DIR/site" --render
"""

[tasks.clean]
description = "Remove build and site artifacts"
run = 'rm -rf "$OUT_DIR"'

[hooks]
postinstall = "lefthook install"
