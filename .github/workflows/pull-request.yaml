---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Pull Request

on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  changed:
    name: Discover changed sources
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      native: ${{ steps.native-files.outputs.changed_files != '[]' }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            sources/**

      - name: Get changed native files
        id: native-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            native/**
            scripts/builtins-extract.sh

      - name: Build matrix
        id: matrix
        # Each changed path looks like "sources/<org>/<repo>/(vendir|kind|extract).yaml".
        # Splitting by '/' and taking [1:3] yields the same owner/repo for
        # any filename, so unique_by(.name) dedupes when multiple change.
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
        run: |
          matrix=$(jq -c '
            [ .[]
              | (split("/") | .[1:3]) as $p
              | {
                  name: ($p | join("/")),
                  dir:  ("sources/" + ($p | join("/"))),
                  out:  ("out/crds/" + ($p | join("__")) + ".yaml"),
                  artifact: ("crds-" + ($p | join("__")))
                }
            ] | unique_by(.name)
          ' <<< "$CHANGED_FILES")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ needs.changed.outputs.matrix != '[]' }}
    needs:
      - changed
    name: Build ${{ matrix.source.name }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        source: ${{ fromJSON(needs.changed.outputs.matrix) }}
      fail-fast: false
      max-parallel: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install_args: --locked

      - name: Restore vendor cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vendor/${{ matrix.source.artifact }}
          key: vendor-${{ runner.os }}-${{ matrix.source.name }}-${{ hashFiles(format('{0}/vendir.yml', matrix.source.dir), format('{0}/kind.yaml', matrix.source.dir), format('{0}/extract.yaml', matrix.source.dir), 'scripts/build.sh', 'scripts/kind-extract.sh') }}

      - name: Extract CRDs
        env:
          VENDIR_GITHUB_API_TOKEN: ${{ github.token }}
          VENDOR_CACHE: ${{ github.workspace }}/out/vendor/${{ matrix.source.artifact }}
        run: mise run build "${{ matrix.source.dir }}" "${{ matrix.source.out }}"

  native:
    if: ${{ needs.changed.outputs.native == 'true' }}
    needs:
      - changed
    name: Build native schemas
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          install_args: --locked

      - name: Build native schemas
        run: |
          mise run swagger
          crd-schema-publisher convert --openapi out/swagger.json --kustomize -o out/site

  status:
    if: ${{ !cancelled() }}
    needs:
      - build
      - native
    name: Build Success
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "${{ toJSON(needs.*.result) }}"
