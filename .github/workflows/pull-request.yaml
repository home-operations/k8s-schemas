---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Pull Request

on:
  merge_group:
  pull_request:

jobs:
  changed:
    name: Discover changed sources
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |-
            sources/**/vendir.yml
            extras/**/vendir.yml
            scripts/**
            .mise.toml
            .github/workflows/pull-request.yaml

      - name: Build matrix
        id: matrix
        # Any non-source change (scripts, mise, workflow) rebuilds everything.
        run: |
          changed='${{ steps.changed-files.outputs.changed_files }}'
          if jq -e 'any(.[]; test("^(sources|extras)/[^/]+/[^/]+/vendir\\.yml$") | not)' <<< "$changed" > /dev/null; then
            mapfile -t candidates < <(printf '%s\n' sources/*/*/vendir.yml extras/*/*/vendir.yml)
          else
            mapfile -t candidates < <(jq -r '.[]' <<< "$changed")
          fi
          paths='[]'
          for p in "${candidates[@]}"; do
            [[ -f "$p" ]] && paths=$(jq -c --arg p "$p" '. + [$p]' <<< "$paths")
          done
          matrix=$(jq -c '
            [ .[]
              | (split("/")) as $s
              | $s[0] as $root
              | ($s[1:3]) as $p
              | {
                  name: ($root + "/" + ($p | join("/"))),
                  kind: (if $root == "sources" then "source" else "extra" end),
                  dir:  ($root + "/" + ($p | join("/"))),
                  out:  (if $root == "sources"
                          then "out/crds/" + ($p | join("__")) + ".yaml"
                          else "out/site/extras/" + ($p | join("/")) end)
                }
            ] | unique_by(.name)
          ' <<< "$paths")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ needs.changed.outputs.matrix != '[]' }}
    needs:
      - changed
    name: Build ${{ matrix.source.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        source: ${{ fromJSON(needs.changed.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Vendor
        env:
          VENDIR_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          case "${{ matrix.source.kind }}" in
            source) mise run build "${{ matrix.source.dir }}" "${{ matrix.source.out }}" ;;
            extra)  mise run extra "${{ matrix.source.dir }}" "${{ matrix.source.out }}" ;;
          esac

  status:
    if: ${{ !cancelled() }}
    needs:
      - "build"
    name: Build Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "${{ toJSON(needs.*.result) }}"
