---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

on:
  push:
    branches:
      - main
    paths:
      - .renovaterc.json5
      - .renovate/**.json5
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Renovate
        id: dispatch
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository_owner }}/.github
        # gh workflow run doesn't print the dispatched run id; poll for it.
        run: |-
          prev=$(gh run list --repo "$REPO" --workflow renovate.yaml \
            --limit 1 --json databaseId --jq '.[0].databaseId // ""')
          gh workflow run renovate.yaml \
            --repo "$REPO" \
            --ref main \
            --field "autodiscoverFilter=${{ github.event.repository.name }}"
          for _ in $(seq 1 30); do
            run_id=$(gh run list --repo "$REPO" --workflow renovate.yaml \
              --limit 1 --json databaseId --jq '.[0].databaseId // ""')
            if [[ -n "$run_id" && "$run_id" != "$prev" ]]; then
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo "Dispatched Renovate run did not appear within 60s" >&2
          exit 1

      - name: Await Renovate Completion
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          gh run watch \
            --repo "${{ github.repository_owner }}/.github" \
            "${{ steps.dispatch.outputs.run_id }}" \
            --exit-status

      - name: Renovate Output
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          gh run view \
            --repo "${{ github.repository_owner }}/.github" \
            --log "${{ steps.dispatch.outputs.run_id }}"
